AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Kentik Flow Collection - Centralized Logging Account Configuration.
  Deploys the IAM policy and role for VPC Flow Log collection from a centralized
  S3 logging account. All spoke account flow logs are read from regional S3 buckets
  in this account. Kentik connects directly using this role — no hub account required.
  For metadata collection deploy kentik-hub-account-cfn.yaml and kentik-spoke-account-cfn.yaml.
  Reference: https://kb.kentik.com/docs/metadata-configuration-aws#standard-configuration

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  KentikCompanyID:
    Type: String
    Description: >
      Your Kentik Company ID (the "Account #" found under Settings > Licenses
      in the Kentik portal). Used as the ExternalId in the role trust policy.
    AllowedPattern: ".+"
    ConstraintDescription: KentikCompanyID must not be empty.

  PolicyName:
    Type: String
    Default: KentikFlowPolicy
    Description: Name of the IAM policy to create in this account.

  RoleName:
    Type: String
    Default: KentikFlowRole
    Description: Name of the IAM role to create in this account.

  S3BucketNames:
    Type: CommaDelimitedList
    Description: >
      Comma-separated names of the regional S3 buckets where centralized VPC Flow
      Logs are stored. Each name must be exact — access is locked to these specific
      buckets only, no wildcards.
      Example: neto-rubrik-dev-us-east-1,neto-rubrik-dev-us-east-2,neto-rubrik-dev-us-west-2

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ---- IAM Policy ---------------------------------------------------------
  KentikFlowPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: >-
        Grants Kentik read-only access to centralized VPC Flow Log S3 buckets.
        Scoped to exact bucket names provided — no wildcard bucket access.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KentikFlowLogsBucketLevel
            Effect: Allow
            Action:
              - s3:GetBucketLocation
              - s3:ListBucket
            Resource: !Split
              - ","
              - !Sub
                - "arn:aws:s3:::${Joined}"
                - Joined: !Join [",arn:aws:s3:::", !Ref S3BucketNames]
          - Sid: KentikFlowLogsObjectLevel
            Effect: Allow
            Action:
              - s3:GetObject
            Resource: !Split
              - ","
              - !Sub
                - "arn:aws:s3:::${Joined}/*"
                - Joined: !Join ["/*,arn:aws:s3:::", !Ref S3BucketNames]

  # ---- IAM Role -----------------------------------------------------------
  KentikFlowRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: 3600
      Description: >-
        Assumed directly by Kentik's AWS account to collect VPC Flow Logs from
        centralized S3 buckets in this account. No hub account is involved.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KentikTrust
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::834693425129:root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref KentikCompanyID
              ArnEquals:
                aws:PrincipalArn: arn:aws:iam::834693425129:role/eks-ingest-node
      ManagedPolicyArns:
        - !Ref KentikFlowPolicy

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RoleArn:
    Description: >
      ARN of the Kentik flow role. Enter this in the Kentik portal when
      configuring VPC Flow Log collection for this account.
    Value: !GetAtt KentikFlowRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  RoleName:
    Description: Name of the Kentik flow IAM role.
    Value: !Ref KentikFlowRole
    Export:
      Name: !Sub "${AWS::StackName}-RoleName"

  AccountId:
    Description: AWS Account ID where this stack was deployed (central logging account).
    Value: !Ref AWS::AccountId
    Export:
      Name: !Sub "${AWS::StackName}-AccountId"
