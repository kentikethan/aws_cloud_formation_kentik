AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Kentik Metadata Collection - Standard Account (Metadata Only).
  Deploys the IAM policy and role for AWS metadata collection in a single account
  using the Kentik standard IAM architecture. Kentik connects directly to each
  account using this role — no hub account required.
  For VPC Flow Log collection deploy kentik-standard-account-flow-cfn.yaml separately.
  Reference: https://kb.kentik.com/docs/metadata-configuration-aws#standard-configuration

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  KentikCompanyID:
    Type: String
    Description: >
      Your Kentik Company ID (the "Account #" found under Settings > Licenses
      in the Kentik portal). Used as the ExternalId in the role trust policy.
    AllowedPattern: ".+"
    ConstraintDescription: KentikCompanyID must not be empty.

  PolicyName:
    Type: String
    Default: KentikMetadataPolicy
    Description: Name of the IAM policy to create in this account.

  RoleName:
    Type: String
    Default: KentikMetadataRole
    Description: Name of the IAM role to create in this account.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ---- IAM Policy ---------------------------------------------------------
  KentikMetadataPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: >-
        Grants Kentik read-only access to AWS metadata per kb.kentik.com/docs/aws-endpoints-list.
        Covers EC2, DirectConnect, ELB, IAM, Network Firewall, Network Manager, and optional CloudWatch metrics.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KentikMetadataReadOnly
            Effect: Allow
            Action:
              # CloudWatch (optional)
              - cloudwatch:ListMetrics
              - cloudwatch:GetMetricStatistics
              - cloudwatch:GetMetricData
              # DirectConnect
              - directconnect:DescribeDirectConnectGateways
              - directconnect:DescribeVirtualInterfaces
              - directconnect:DescribeLags
              - directconnect:DescribeConnections
              # EC2
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeCustomerGateways
              - ec2:DescribeFlowLogs
              - ec2:DescribeInternetGateways
              - ec2:DescribeInstances
              - ec2:DescribeNatGateways
              - ec2:DescribeNetworkAcls
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeManagedPrefixLists
              - ec2:DescribePrefixLists
              - ec2:DescribeRouteTables
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeTransitGateways
              - ec2:DescribeTransitGatewayAttachments
              - ec2:DescribeTransitGatewayVpcAttachments
              - ec2:DescribeTransitGatewayRouteTables
              - ec2:DescribeTransitGatewayConnects
              - ec2:DescribeTransitGatewayConnectPeers
              - ec2:DescribeVpcs
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeVpnConnections
              - ec2:DescribeVpnGateways
              - ec2:SearchTransitGatewayRoutes
              - ec2:GetManagedPrefixListEntries
              # ELB
              - elasticloadbalancing:DescribeLoadBalancers
              # IAM
              - iam:ListAccountAliases
              # Network Firewall
              - network-firewall:ListFirewalls
              - network-firewall:DescribeFirewall
              - network-firewall:ListFirewallPolicies
              - network-firewall:DescribeFirewallPolicy
              - network-firewall:DescribeRuleGroup
              # Network Manager
              - networkmanager:ListCoreNetworks
              - networkmanager:GetCoreNetwork
              - networkmanager:GetCoreNetworkPolicy
              - networkmanager:ListAttachments
              - networkmanager:GetNetworkRoutes
            Resource: "*"

  # ---- IAM Role -----------------------------------------------------------
  KentikMetadataRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: 3600
      Description: >-
        Assumed directly by Kentik's AWS account to collect metadata from
        this account. No hub account is involved.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KentikTrust
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::834693425129:root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref KentikCompanyID
              ArnEquals:
                aws:PrincipalArn: arn:aws:iam::834693425129:role/eks-ingest-node
      ManagedPolicyArns:
        - !Ref KentikMetadataPolicy

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RoleArn:
    Description: >
      ARN of the Kentik role. Enter this in the Kentik portal when configuring
      the AWS integration for this account.
    Value: !GetAtt KentikMetadataRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"

  RoleName:
    Description: Name of the Kentik IAM role.
    Value: !Ref KentikMetadataRole
    Export:
      Name: !Sub "${AWS::StackName}-RoleName"

  AccountId:
    Description: AWS Account ID where this stack was deployed.
    Value: !Ref AWS::AccountId
    Export:
      Name: !Sub "${AWS::StackName}-AccountId"
