AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Kentik Metadata Collection - Organization Management Account Setup.
  Deploys an IAM role in the AWS Organizations management account that grants
  the Kentik hub account permission to list organization accounts. Required when
  the hub account is not the Organizations management account.
  Reference: https://kb.kentik.com/docs/metadata-configuration-aws

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  HubAccountId:
    Type: String
    Description: >
      AWS Account ID of the Kentik hub account. Principals in this account
      will be allowed to assume the organization listing role.
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a valid 12-digit AWS account ID.

  HubRoleName:
    Type: String
    Default: KentikMetadataPrimaryRole
    Description: >
      Name of the Kentik primary role in the hub account. Only this specific
      role will be trusted to assume the org listing role.

  OrgPolicyName:
    Type: String
    Default: KentikMetadataOrgPolicy
    Description: Name of the IAM policy to create in the management account.

  OrgRoleName:
    Type: String
    Default: KentikMetadataOrgRole
    Description: Name of the IAM role to create in the management account.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ---- IAM Policy ---------------------------------------------------------
  KentikOrgPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref OrgPolicyName
      Description: >-
        Grants read-only access to list AWS Organization accounts for Kentik
        metadata collection.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: OrgListAccounts
            Effect: Allow
            Action:
              - organizations:ListAccounts
            Resource: "*"

  # ---- IAM Role -----------------------------------------------------------
  KentikOrgRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref OrgRoleName
      Description: >-
        Assumed by the Kentik hub account's primary role to list AWS Organization
        accounts when the hub is not the management account.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DelegateOrgReadToHub
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${HubAccountId}:role/${HubRoleName}"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref KentikOrgPolicy

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  OrgRoleArn:
    Description: >
      ARN of the Kentik organization role. Provide this to Kentik when
      configuring the integration so the hub role can assume it.
    Value: !GetAtt KentikOrgRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-OrgRoleArn"

  OrgRoleName:
    Description: Name of the Kentik organization IAM role.
    Value: !Ref KentikOrgRole
    Export:
      Name: !Sub "${AWS::StackName}-OrgRoleName"

  ManagementAccountId:
    Description: AWS Account ID of this management account.
    Value: !Ref AWS::AccountId
    Export:
      Name: !Sub "${AWS::StackName}-ManagementAccountId"
