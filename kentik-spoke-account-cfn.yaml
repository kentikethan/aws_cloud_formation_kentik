AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Kentik Metadata Collection - Spoke (Secondary) Account Setup (Metadata Only).
  Deploys the IAM policy and role in each secondary/spoke account for the
  Kentik nested IAM architecture. The hub account's primary role assumes this
  role to collect metadata.

  Deploy this template via CloudFormation StackSets targeting all spoke
  accounts in your organization (or a specific OU/account list).
  Reference: https://kb.kentik.com/docs/metadata-configuration-aws

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  HubAccountId:
    Type: String
    Description: >
      AWS Account ID of the Kentik hub (primary) account. The spoke role's
      trust policy will allow this account to assume the secondary role.
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a valid 12-digit AWS account ID.

  HubRoleName:
    Type: String
    Default: KentikMetadataPrimaryRole
    Description: >
      Name of the Kentik primary role in the hub account. Only this specific
      role will be trusted to assume this spoke role.

  SecondaryPolicyName:
    Type: String
    Default: KentikMetadataSecondaryPolicy
    Description: Name of the IAM policy to create in each spoke account.

  SecondaryRoleName:
    Type: String
    Default: KentikMetadataSecondaryRole
    Description: Name of the IAM role to create in each spoke account.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ---- IAM Policy ---------------------------------------------------------
  KentikSecondaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref SecondaryPolicyName
      Description: >-
        Grants Kentik read-only access to AWS metadata per kb.kentik.com/docs/aws-endpoints-list.
        Covers EC2, DirectConnect, ELB, IAM, Network Firewall, Network Manager, and optional CloudWatch metrics.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KentikMetadataReadOnly
            Effect: Allow
            Action:
              # CloudWatch (optional)
              - cloudwatch:ListMetrics
              - cloudwatch:GetMetricStatistics
              - cloudwatch:GetMetricData
              # DirectConnect
              - directconnect:DescribeDirectConnectGateways
              - directconnect:DescribeVirtualInterfaces
              - directconnect:DescribeLags
              - directconnect:DescribeConnections
              # EC2
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeCustomerGateways
              - ec2:DescribeFlowLogs
              - ec2:DescribeInternetGateways
              - ec2:DescribeInstances
              - ec2:DescribeNatGateways
              - ec2:DescribeNetworkAcls
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeManagedPrefixLists
              - ec2:DescribePrefixLists
              - ec2:DescribeRouteTables
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeTransitGateways
              - ec2:DescribeTransitGatewayAttachments
              - ec2:DescribeTransitGatewayVpcAttachments
              - ec2:DescribeTransitGatewayRouteTables
              - ec2:DescribeTransitGatewayConnects
              - ec2:DescribeTransitGatewayConnectPeers
              - ec2:DescribeVpcs
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeVpnConnections
              - ec2:DescribeVpnGateways
              - ec2:SearchTransitGatewayRoutes
              - ec2:GetManagedPrefixListEntries
              # ELB
              - elasticloadbalancing:DescribeLoadBalancers
              # IAM
              - iam:ListAccountAliases
              # Network Firewall
              - network-firewall:ListFirewalls
              - network-firewall:DescribeFirewall
              - network-firewall:ListFirewallPolicies
              - network-firewall:DescribeFirewallPolicy
              - network-firewall:DescribeRuleGroup
              # Network Manager
              - networkmanager:ListCoreNetworks
              - networkmanager:GetCoreNetwork
              - networkmanager:GetCoreNetworkPolicy
              - networkmanager:ListAttachments
              - networkmanager:GetNetworkRoutes
            Resource: "*"

  # ---- IAM Role -----------------------------------------------------------
  KentikSecondaryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref SecondaryRoleName
      MaxSessionDuration: 3600
      Description: >-
        Assumed by the Kentik hub account's primary role to collect metadata
        from this spoke account.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowHubAccountAssume
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${HubAccountId}:role/${HubRoleName}"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref KentikSecondaryPolicy

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  SecondaryRoleArn:
    Description: ARN of the Kentik secondary role created in this spoke account.
    Value: !GetAtt KentikSecondaryRole.Arn

  SecondaryRoleName:
    Description: Name of the Kentik secondary IAM role.
    Value: !Ref KentikSecondaryRole

  SpokeAccountId:
    Description: AWS Account ID of this spoke account.
    Value: !Ref AWS::AccountId
